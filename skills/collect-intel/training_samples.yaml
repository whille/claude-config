## 训练样本使用方法

### 初始化权重

```bash
# 加载训练样本，初始化权重矩阵
python scripts/init_weights.py --samples training_samples.yaml
```

### 运行测试

```bash
# 运行测试样本，验证权重效果
python scripts/test_collect_intel.py --samples training_samples.yaml
```

### 收集反馈

```bash
# 收集用户反馈，更新权重
python scripts/collect_feedback.py --output feedback.yaml
```

