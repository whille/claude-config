## 权重校准规则

### 规则1: 一致性检验

```python
def validate_weights(domain_weights):
    """
    权重必须满足：
    1. 所有权重 >= 0
    2. 权重总和 = 1.0（归一化）
    3. 主导专家权重 >= 0.30
    4. 权重数量 3-5 个
    """
    assert sum(domain_weights.values()) == 1.0
    assert all(w >= 0 for w in domain_weights.values())
    assert max(domain_weights.values()) >= 0.30
    assert len(domain_weights) >= 3 and len(domain_weights) <= 5
```

### 规则2: 反馈调优

```python
def adjust_weight_from_feedback(weights, feedback):
    """
    根据用户反馈调整权重

    feedback:
    - most_useful: 最有用的专家
    - least_useful: 最没用的专家
    - missing_perspective: 缺失的视角
    - overall_score: 整体评分 1-10
    """
    if feedback["overall_score"] >= 7:
        # 高分：微调
        weights[feedback["most_useful"]] += 0.03
    else:
        # 低分：大调
        weights[feedback["most_useful"]] += 0.05
        weights[feedback["least_useful"]] -= 0.05

    # 归一化
    normalize(weights)
```

### 规则3: 领域迁移

```python
def transfer_weights(source_domain, target_domain):
    """
    当新领域缺乏训练样本时，从相似领域迁移权重

    例如：
    - FINANCE → INVEST（金融→投资）
    - LEARNING → LEARN（学习→理解）
    """
    base_weights = get_weights(source_domain)
    # 按专家领域相关性调整
    for expert, weight in base_weights.items():
        if expert in get_domain_experts(target_domain):
            target_weights[expert] = weight * relevance_factor
    normalize(target_weights)
```

