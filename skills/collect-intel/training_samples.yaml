# Collect Intel 训练样本集

> 用于校准领域-专家权重矩阵

---

## 训练样本格式

```yaml
sample_id: "SAMPLE-001"
question: "[用户问题]"
domain:
  primary: "[主领域代码]"
  secondary: ["[次要领域1]", "[次要领域2]"]
experts:
  - skill: "[skill名称]"
    weight: [权重 0.0-1.0]
    expected_focus: "[预期回答重点]"
    validation_criteria: "[验证标准]"
validation:
  consensus_check: "[共识点检验]"
  divergence_check: "[分歧点检验]"
  weight_adjustment_rule: "[权重调整规则]"
user_feedback: null  # 运行时填充
```

---

## 样本列表

### SAMPLE-001: 投资决策 - 股票投资

```yaml
sample_id: "SAMPLE-001"
question: "泡泡玛特现在值得投资吗？"
domain:
  primary: "INVEST"
  secondary: ["RISK"]
experts:
  - skill: "munger-perspective"
    weight: 0.35
    expected_focus: |
      1. 护城河分析：IP竞争优势是什么？能持续多久？
      2. 管理层激励：谁在赚钱？利益是否对齐？
      3. 逆向思考：什么情况下一定亏钱？
      4. 三筐分类：Yes/No/Too Hard？
    validation_criteria: "必须包含护城河分析和逆向思考"

  - skill: "taleb-perspective"
    weight: 0.25
    expected_focus: |
      1. 尾部风险：极端情况下会怎样？
      2. 反脆弱检验：下跌时能恢复吗？
      3. 凸性分析：收益分布是凸还是凹？
    validation_criteria: "必须包含尾部风险分析"

  - skill: "naval-perspective"
    weight: 0.20
    expected_focus: |
      1. 长期价值：5年10年后的护城河
      2. 杠杆思维：IP是产品杠杆吗？
    validation_criteria: "必须包含长期视角"

  - skill: "zhang-yiming-perspective"
    weight: 0.20
    expected_focus: |
      1. 组织能力：团队能力如何？
      2. 全球化：海外扩张能力
      3. 产品克制：IP迭代节奏
    validation_criteria: "必须包含组织视角（中国专家优势）"

validation:
  consensus_check: "估值方法、风险识别"
  divergence_check: |
    - 芒格可能放 Too Hard（不熟悉消费赛道）
    - Taleb 强调尾部风险（IP依赖单一品类）
    - 张一鸣可能提供中国消费市场洞察
  weight_adjustment_rule: |
    如果芒格明确给出投资判断，提高其权重
    如果张一鸣提供独特中国视角，提高其权重
user_feedback:
  most_useful: "munger-perspective"
  decision_tendency: "观望"
  missing_perspective: ["竞争分析", "消费者视角"]
  overall_score: 8
  weight_adjustment: null  # 权重配置合理，无需调整
  timestamp: "2026-05-02"
```

